<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9Oer+R5YFyc5sdxZ3D0n1qXj1i0T5m0b8tXQ5n1F4r2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  </head>
  <body>
    {% if user is defined and user %}
      <div class="tm-shell">
        <aside class="tm-sidebar">
          <a class="tm-brand" href="/dashboard">
            <span class="tm-brand-mark">TM</span>
            <span>{{ app_name }}</span>
          </a>
          <nav class="nav nav-pills flex-column tm-nav">
            {% for item in nav_items %}
              <a class="nav-link tm-nav-link {% if current_path == item.endpoint %}active{% endif %}" href="{{ item.endpoint }}">
                <i class="bi {{ item.icon }}"></i>
                <span>{{ item.label }}</span>
              </a>
            {% endfor %}
          </nav>
        </aside>
        <div class="tm-main">
          <header class="navbar tm-topbar">
            <div>
              <div class="tm-topbar-label">Рабочая панель</div>
              <strong>{% block page_heading %}Dashboard{% endblock %}</strong>
            </div>
            <div class="d-flex align-items-center gap-3">
              <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                  <i class="bi bi-person-circle"></i>
                  {{ user.full_name }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                  <li><span class="dropdown-item-text small text-secondary">{{ user.username }}</span></li>
                  <li><hr class="dropdown-divider"></li>
                  <li>
                    <form method="post" action="/logout" class="px-2">
                      <button class="btn btn-outline-danger btn-sm w-100" type="submit">
                        <i class="bi bi-box-arrow-right"></i>
                        Выйти
                      </button>
                    </form>
                  </li>
                </ul>
              </div>
            </div>
          </header>
          <main class="tm-content container-fluid">
            {% block content %}{% endblock %}
          </main>
        </div>
      </div>
    {% else %}
      {% block guest_content %}{% endblock %}
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="{{ url_for('static', path='js/app.js') }}"></script>
  </body>
</html>
