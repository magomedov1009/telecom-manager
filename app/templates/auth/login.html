{% extends "base.html" %}

{% block title %}Вход | {{ app_name }}{% endblock %}

{% block guest_content %}
<div class="tm-login-page">
  <div class="tm-login-card">
    <div class="mb-4">
      <div class="tm-brand-mark mb-3">TM</div>
      <h1 class="h3 fw-bold mb-2">Telecom Manager</h1>
      <p class="text-secondary mb-0">Войдите в систему управления подключениями, складом и финансами.</p>
    </div>

    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="d-grid gap-3">
      <div>
        <label class="form-label" for="username">Логин</label>
        <input class="form-control form-control-lg" id="username" name="username" value="{{ username | default('') }}" autocomplete="username" required autofocus>
      </div>
      <div>
        <label class="form-label" for="password">Пароль</label>
        <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary btn-lg" type="submit">
        <i class="bi bi-shield-lock"></i>
        Войти
      </button>
    </form>
  </div>
</div>
{% endblock %}
