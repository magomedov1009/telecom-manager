services:
  app:
    build:
      context: .
    container_name: telecom-manager-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    container_name: telecom-manager-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telecom_manager}
      POSTGRES_USER: ${POSTGRES_USER:-telecom_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telecom_manager_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
